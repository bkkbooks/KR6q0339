body:
  text: 和張防禦我有一方田於中息萬緣生涯雖寂爾日用不徒然知足長年樂無求在處禪西鄰知此意松竹銷寒煙送超禪人歸省親參玄曾未造玄微肯學新豐十不歸歸舉清涼答佛話教娘知有祖師機歸雲拖雲從龍去又回無心却似有心來只因怕失老僧約永日岩房撥不開臭菴自家汗氣不曾覺口未曾開人已知熏出蘇州二石佛一人掩鼻一攢眉中山英標拔俗一千丈壁立孤危不可攀南北東西徒斫額誰知步步在其間省行堂主往霅川化油火冷灰寒老病身一燈深夜伴孤貧忍將滴滴思鄉淚説與溪頭問疾人異手相士天地同根歸一指先生三四已為多等間竪起拳頭處數量如何數得他送保慧大師生在如來家須學如來行諸念入正念有諍歸無諍少林佛國不再見臺山大會堪憑波何人哉我何人眨起眉毛宜猛省送林藏主省親有十不歸今且歸不願再見今再見古今大道常坦然各自當門通一線送珙上人之廬山不到廬山不是僧斯言斯語亦何曾珙今興盡還歸去五老依前倚碧層送艮侍者隨本師歸瀘南依師參扣到無參只麼呼三應亦三話到不相辜負處瀘南元是舊瀘南孟府送猿有頌次韻謝之居從岩洞友熊羆養在候門送石溪要識將軍成物意往來莫作聽猿啼延壽化帳捲起何如放下時微風輕撼碧雲垂夜深動地蚊雷吼病枕安然總不知沈兼簽記夢一微塵裡三千界半剎那間八萬春如是往來如是住不知誰主又誰賓送慧大師剃除紺髮搭伽梨經卷輪珠常自隨欲扣玄關參自己好看實際訪俱胝昌大師號曰桂岩住廣福説偈勉之桂岩桂子久飄香時節催開選佛場莫作末山施半杓使人特地喚娘娘聰大師號無聞送廣福住院來日臺山大會齋隔身句子絶安排如今已落無聞手雙放雙收機莫偕示本上座勿遊魚魯刁刀市莫逐千干十卜人他日有緣重會面金毛獅子要嚬呻送李道士細探道德五千字字字君家説底書要識玄之又玄旨淡然清對了無餘送圭維那年來箇事帶誵訛十卜千干不較多狹路相逢略擡手看伊眼腦是如何送光典座辣辣辛辛一味禪慣常豈在杓頭邊一千五百善知識未出門時話已圓送真大師戴起還同放下時好觀實際訪俱胝至今五百年來下一段風光付與誰送心淨頭處塵勞界住深禪幾度悲心碎復圓得失是非都放下頭頭皆我舊山川行者智江歸廬山乞頌庭前荒草正萋萋却憶丹霞剗去時蓮社峰高相見了回來却把聖僧騎小佛事法事次第依屏岩清規第一移龕第二鎖龕仙上坐大仙心擬分付萬德不將來千手拓不去仙上座放下著猛提取此時入得此門來還須鎖斷奔馳路第三挂真石田和尚南山片雲西湖滴水面目全彰何處回避謂是石田老人千里對面謂非石田老人對面千里是耶非耶乃展真云總在者裡休論漚滅漚生愛取清風匝地第四舉哀無準和尚空索索而來逼塞虗空撥不開赤條條而去積嶽堆山無著處便恁麼猶是最初機未是末後句且如何最末後句顧視大衆蒼天蒼天冤苦冤苦第五奠茶鐵塔長老五更睡眼正迷麻歸夢悠悠未到家探盡方書窮祕訣只消苦澀一甌茶正覺長老於此證得命脈去昔年正覺堂上逢而不逢今日涅槃臺前別而不別雖然如是殷勤傾盡此杯去烈焰堆中急轉身第六奠湯欠第七對靈小參為淨慈無極和尚我宗無語句亦無一法與人所以德山入門便棒臨濟入門便喝如撾塗毒鼓如按金剛王聞之者喪擬之則亡一向恁麼去道絶人荒雖然官不容針不免別開線路向二千年前十萬里外親面相見去也阿呵呵人從江西來報道仰山集雲峰與廬山蓮社峰比肩同往中印土拘尸那城恰值二月十五日黃面老子入般涅槃臥金棺露雙足説偈曰諸行無常是生滅法生滅滅已寂滅為樂遂化三昧火焚金色身見火中金剛舍利非我等事回謁達磨大師於熊耳峯下低頭問訊舉目一觀大師已在蔥嶺手携隻履翩翩獨行乃進前問曰行色何匆如是耶幸聞一語曰五口相共行九十無彼我乃以手指云烏那曹溪大師治裝歸新州宜往送之大師聞其語舉手搖拽云葉落歸根來時無口引得南山無極老人忍俊不住索筆書偈曰六十四年生憎佛祖一笑翻身虗空獨露乃倒騎慧日閣出三門逾西湖蕭然長往喝一喝集雲峯歸仰山蓮社峯歸廬山拈拄杖云惟我拄杖子雖不入他保社仁義道中也要助哀卓拄杖一下復舉南院僧問從上諸聖向什麼處去院云不上天堂即入地獄僧云和尚作麼生院云還知寶應老落處麼僧擬議院以拂子驀口打復喚僧近前云令合是汝行又打一拂子雪竇云令既自行且拂子不知來處雪竇道箇瞎且要雪上加霜師云是則全機作用非則倚勢欺人若知淨慈堂頭落處便知從上諸聖落處且即今在什麼處良久云佛祖位中留不住人間天上絶安排第八起龕震侍者震青天雷擊塗毒鼓伶俐衲僧點頭自許以靈山為師以徑山為父同門出入相辜負既知移步不移身何似移身又移步第九門首挂真欠第十門首茶欠第十一門首湯欠第十二下火鑒知客趙州喫茶韶陽抽顧石田徹底鄉情隻手一齊分付便把南山換北山時將東土移西土鑒知客猛省提撕更進一步腳未跨刀山投身大火聚淨慈無極和尚第二把火有頌舉火炬云此火把子上竺講師已為説破了也靈隱不免頭上安頭去六十四年過犯彌天生憎佛祖結盡冤苦一笑翻身躍倒畫瓶虗空獨露又恁麼去此是無極禪師末後親手分付未是他家末後全提句石肝腸鐵面具未上刀山先投火聚解使陝府鐵牛吞却南山石虎亦未是他家出沒卷舒遊戲玩具無極老人有些真實好處語言所不及又如何商量擲火炬云向者裡著取第十三清涼無相長老提衣盡大地是清涼正體無一絲非無相妙衣此衣不可覆藏天寧如何提掇舉衣云雞足峰下多子塔前闊狹短長應量恰好於此承當得去豈止價重娑婆苟或躊躇一唱五百第十四告副莊舉骨合澗橋邊二寺門外一片間田水雲聚會告禪既有靈骨也好瞎驢趂隊要見麼面具現在湛堂主入骨當處常湛然覔之不可見要見麼舉骨云箇是湛堂主向飛星撒火處收拾得底落在山僧手裡畢竟如何分付湛堂主日月不及處要儞急翻身第十五源監寺入塔源從劍門來久在南湖寺謂與南湖同不與南湖比倒跨楊岐三腳驢幾度州中糶黃米佛口蛇心雞頭鳳尾一時收入此門來塔戶風光都屬儞源監寺宜相委冷地不得打睡第十六癡絶和尚入祖堂未登鍾阜阿蘭若已踞凌霄窣堵波莫謂老人無定止只緣貧恨一身多如是如是放下分身兩處看不然不然日午依然虧一半此是住當山第三十五代癡絶和尚即今向什麼處安著莫言無位次何處不稱尊已上當代住持入滅法事次第如是月庭和尚第二把火前丹丘報恩月庭和尚還記得麼最初一步天台智者不覺點頭末後一機妙峰老人至今斫額與麼與麼一片孤光合自知不與麼不與麼兩處分輝負清墮於斯生死去來今日一時放過舉火云月庭和尚只者箇不得喚作性火真空又不得喚作性空真火直下承當休懡㦬側聽白雲重點破為坦都莊下火昔年曾作莊中主祖父田園已遍知夜半人牛俱不見此時正值月明時某人末後句莫追隨七十五年無影樹且看火裡倒抽枝樞典座下火羮以笟籬飯以木杓二年同一春如法修事著山中衆口六十丈老樞只憑者一著者一著是什麼某人還會麼大洋海底火星飛何似嵩山破竈墮寄首座下火孤然絶攀翛然無寄四十四年邡潭鱉鼻天宮第二座説法睡眼未開徑山分座提綱宗言猶在耳某人諸事且置而今風乍休雨乍霽出門無事相餞行領取山僧火把子昱西堂下火環琅山中恁麼來天聖屋頭恁麼住凌霄峰頂恁麼去某人天寒且來者裡向火虔菴主固知庫下火德立直歲入塔世事炎炎如火聚老虔一一盡知之而今換步移身去正是蓮開見佛時深固幽遠到者知幾惟固知庫全身在是青山白雲中紫煙紅焰裡撒火飛星皆在儞有德可立無道可修問田中事叉手拽鍬風骨既露醜惡難收某人背陰山兮向陽處多子相逢笑未休喜西堂下火祥符長老悅翁西堂還記得麼三十年前生鐵面具思蒙江上轉腳來踏斷思蒙江上路不倚周孔垣牆不入老莊門戶住祥符而不作祥符主人依凌霄而不作凌霄伴侶漚漚和和中歡歡喜喜處莽莽鹵鹵而今雲散水流又向什麼處去某人未上刀山先登火聚艮院主有頌珍修造下火六十四年密密綿綿隨方逐圓失却半邊雲收雨散鐵船到岸月落青天面目依前江國春風二三月錦官花木正爭妍艮院主打圓相云忽然者箇用事時如何揚火炬云只管看劒關珍禪者成就大功用用處鴻毛輕功成山嶽重如是三十年助佛鑒建生伽藍而於佛鑒而不共我此大覺寮工役公所量豈期時節到來遽然而長往珍修造久雨欲晴未晴在儞惜求火種升山主入骨德臘崇高識見明達少年篤學而竭力奉師晚歲住山而隨機應變為嚴金佛靈蹤幻出瓊樓玉殿一日功圓果滿琅琅付囑而歸尚留火後莖茅却要徑山判斷舉骨云升山主擁不聚撥不散從教狼藉空岩畔康書記下火從西過東從東過西步步全是步步還非惺惺憶得到家時從前三百篇到此徒爾為從空放下更莫思惟嶺上石人歌一曲度爐金佛也掀眉法臻淨頭下火雙徑室中真子豈同門外遊人步步是家山念念皆正定有時捨淨入穢有時去穢持淨在兩邊不住兩邊是戲論終非戲論法臻淨頭丙丁童子相邀要儞説些禪病郁都管安塔主珍藏主下火郁都管溪東溪西田頭田尾放去收來了無虗棄如是扶持如是標格本利見成休貪足陌郁都管冷看而今是甚火色塔中主塔中主山僧也下一轉語何似生在窟金毛藏林猛虎威風凜凜然爪牙曾不露如是八十年覔之了無處覔無處即其住安塔主今向烈焰堆中猛著精神宜自薦取師資會遇三喚三譍舉火云只憑者箇一大藏教演出演入舉火云亦只憑者箇三世諸佛在火焰上轉大法輪却憑什麼珍藏主猛著精神莫教蹉過超浴主紹都寺石田小師初水頭下火既不洗塵又不洗體妙觸宣明成佛子住只知得中間安然底且未會鑊湯無冷處超浴主還會麼火焰裡薦取某人要識老爺門戶麼紹之甚易承當最難承當猶自易守護却為難難難屋壁俱易易清風掃地紹都寺知也未家家門前火把子雨零零風颼颼藤枯樹倒便賦歸休既解敲冰藏火種何妨撥火覔浮漚珦副寺下火珦許亮切玉也昔本不生今亦無滅要行便行何太奇絶兩處賣洞山生薑一生用少林祕訣珦副寺末後如是殷勤若得山僧把火助熱義殿主清維那下火古殿無佛日日香煙夜夜燈梵音何來須是少林真種草可謂作有義事是醒悟心是何言歟作無義事是散亂心是何言歟義殿主有亦不拘無亦不拘蕩蕩身心只自如却來火裡現芙蕖清虗之理體自如如有之則虧其德無之則傳其軀何來何往孰親孰踈某人寬廓寂寥都放下炎天飛雪擁紅爐圓覺講主起靈從無住本示有相身寄人間六十九年了夢中百千三昧唯心淨土示有去來而不墮去來自性彌陀具足圓覺而住持圓覺曰戒曰定曰慧以嚴自身非空非假非中以導後學經行坐臥常在其中雖曰授金臺了知萬法不受能事既畢卷衣便行移身換步一句作麼生道去此不遠涅槃臺前有一善知識名勝熱婆羅門宜往彼問同庵講師掩土萬法同中有不同混然都在一菴中而今同異俱拈却踏斷飛來最上峰伏惟新圓寂同庵都録大講師乘悲願而來來無所來依悲願而住住無所住是故從無住本示有為功以戒定慧嚴自身指空假中惠後學教門是賴主席屢遷雖云有道可傳猶錦鱗之滯水而實無法可説似彩鳳之翔雲六十九年一彈指頃談笑自若卷衣而行雲外天香遽寂寥座間花雨俄狼籍盡謂到江吳地盡那知隔岸越山多於斯見同庵老人則未可在要見同庵老人麼佛壠龕中尋不見白雲影裡却相逢高麗講師開龕沒鬚鎖子鎖青空鎖斷奔馳路不通珍重無為無事客不知全體在其中故我慧因正主賢首的傳高麗堂上不庵講師七十三年本無來去百千三昧常自現前進退步趨總是中道大人境界語默動靜無非真空妙理法門處處象王回旋頭頭師子奮迅如是如是休論月午當臺不然不然且任須彌墮地正當此時且道不庵講師常在其中不滯其中一句又作麼生金鎖玄關部掣斷大千經卷出微塵施主煆髮下火才有一毫頭便是一毫頭翳却頂門眼剗去勿存留只箇一毫頭不是一毫頭堆山積嶽塞壑填溝此一一毫頭是不是一一毫頭亦復爾會看烈焰雪花飛不必撥炎求舍利清淨燈首座撒骨石城頂𩕳望鄉園目力窮時却宛然江國春風忽吹散不知消息落誰邊舉骨云箇是清淨爐鞴裡千煅萬煉底燈首座一把靈骨堅如金石瑩若冰霜放去則包括十虗收來則總在者裡平生道義末後夤緣落在天寧手中且道如何安著區中日月不及處方外乾坤自卷舒行者道寶下火道中至寶何處尋討內外討之無蹤日用用之恰好三十三年為陳氏之子不紹家世箕裘四五六歲在天寧出家不剗殿前之草無拘生死去來不管菩提煩惱然雖如是更須知有末後一句舉火云透者一關隻手分付為智舉五戒下火天台臨海舉五戒靈隱堂中幾歲華掃地添爐新活業拾薪供水舊生涯不憂衣鉢不入手且喜身心已出家舉五戒劫火洞然無退轉却來領取一袈裟知覺飯頭下火辨出家事真出家兒淘米去沙底不是淘沙去米底亦非舉火云為伊點發者些兒從教遍界火星飛淨道淨人下火出家勤苦貴精修衣食隨分勿外求墜石腰間貪踏碓不知明月過滄洲既為靈隱堂中客當把盧公作標格明心見性如未曾不免死生苦煎迫今年隨我過虎丘一疾纏綿只麼休休則休已畢竟向什麼處去便取山僧火把子明來明去任優遊蘇州道人撒骨入得焦山潑天門戶未是頑賴禁得焦山亘天爐鞴未是頑賴舉骨云直得歷歷落落玲玲瓏瓏如今放去也鳥風振海白浪翻空不貪香餌碧潭寵持淨來園頭下火靈隱堂中客事園持淨來钁頭輕揚下底事絶疑猜解把菩提樹遍於火裡栽來園頭爐中灰燼莫添柴鐵樹無花也著開為朱老郎下火浙東四明山浙西西湖水欲識朱老郎面目只者是平生妙用與神通運米搬柴第一功歷遍諸難六十六事主之心元不同人言已死豈是死我道出彼還沒此渾侖一句相贈行家家門前火把子為張府夫人余氏起棺并掩土無相身中有相身黃金宮闕幾番新百年回首渾如夢誰是惺惺做夢人歿故夫人余氏四十九年從無相中出生有相中入滅中間一動靜一語默往來於黃金殿上白玉樓前富貴榮華無非佛事須知夢中有不夢者昔人云色身敗壞如何是堅固法身曰山花開似錦澗水湛如藍若向者裡領略得去不妨與七賢女把手共行苟或躊躇則聽一偈浩浩塵中七寶聚於中未是安身處青山影裡白雲飛緩步移身亟歸去世界未成早有此片田地胞胎既具便屬夫人余氏而今地闢天開風光溢目山圍水繞春意滿前正當窀穸之辰遽忍別離之恨舍人撫別令子拜違親屬悲摧挽留莫及正恁麼時只知夫人埋玉於斯而不知佛子住此地即是佛受用佛子復是阿誰又喚什麼作此地於斯受用去經行坐臥總在其中佛國天堂不居心外末後一句又作麼生一微塵土都遮護富貴榮華付後人郭公起靈掩土生從無相中受生滅向有相中變滅於中心識本來空一點靈光常照徹歿故郭四公與麼見得去昔本不來虎踞龍蟠面面開今亦無去吳水秦淮如是住湛然不昧去來機一段風光付與誰好箇轉身時節子青山雲外待多時是中一所黃金藏雪擁雲埋知幾年溢目風光無限好如今端的落誰邊落在郭公邊了也還見麼淮山橫立大江來朝松蘿周遭煙雲舒卷賢父兄六十年面目再覩孰後孰先好兒孫五百載旺氣所鍾曰富曰貴可謂家世棲遲之所九原安樂之窩葉落歸根忘懷得旨末後一句如何舉揚開眼閉眼是西方舉足下足皆極樂為上海蔡府屬起靈并秉炬一葉乘潮泛淺深問津上海訪三林水雲影裡逢迎地萬里平疇一片心故我蔡公府屬昔日來于斯一生居于斯治生立業于斯仰事俯育于斯乃至剖破藩籬廣布仁惠勤修檀度遍歷諸山亦不出于斯是以田園望望鴉飛不度子孫森森雁序滿前亦不離于斯奇哉奇哉希有希有能事甫畢方八十有一春拂衣西歸已二百六十日底事潮聲帶慘風韻含悲將臨火化之場水面飄香正是蓮開之際死生無憾矣轉身一著又作麼生雙檜庵頭曾有約佇看火裡現優曇竪火炬云還見麼三世諸佛向者裡成正覺坐道場放大光明破諸幽暗歷代祖師向者裡傳佛心宗開大爐鞴煆聖鎔凡得道諸師向者裡辨正邪焚外書流通正法大檀越蔡君宜義有條攀條無條隨例也入一分今日向者裡捨死生分段之身得金則堅密之體且雙林樹下金棺自焚今日雙檜菴頭香薪自燼雖然如是末後一句徑山老僧與檀越蔡君宿有夤緣不妨今日説破舉火炬云蔡府屬惺惺著猛著精神向這裡薦却為劉都鈐掩壙仙姑一片間田地今日誰來作主人無限風光都占了那堪花木四時春大衆此一穴地混沌未分之前已屬劉公都鈐了也混沌既分之後天地祕之生靈守之俟今日今時和四至界畔一時付與都鈐大尉永為棲遲之所佛土天宮盡在于是此所謂佛子住此地即是佛受用常在於其中經行及坐臥某人靈輀在此且道一靈真性在什麼處若也薦得面目現在其忽未然好水好山環繞處森森松竹引清風挂海湧一峰額古者道千隴萬隴不若一湧我此山名從海湧寺曰雲岩塔戶鎖晴空鐘金敲碧落天下第一勝地人間最上福田故云此峰特標海湧收斂雲山旺氣壯觀水陸雄觀萬歲千秋祝皇家壽考千秋萬歲宏祖域風規莫怪山僧重説偈句高懸海湧一峰牌瑞氣祥光遍九垓近水遠山無限意一時收入此中來楓林挂勸忠旌孝寺額楓林勝槩古今植福之場門扁新題忠孝旌褒之地喜誦唐人詩句尚聞夜半鐘聲一段風光千手莫掩八字飛舞千眼頓開信手拈來當陽顯示廣野朝格下之澤元樞奉如在之靈綿香火於無窮俾山林之有托正恁麼時如何指額云更宜高著眼題目甚分明墨梅一題序叢林以偈頌為禪悅餘味者蓋黃梅有曰此偈亦未見性法眼有曰此頌可續吾宗此皆因語而識人也往往禪宴之暇一歌一詠以淘汰業識疏通性源亦未敢髣佛單明之旨否則錯礱言句滋培道根其損益又從而可知學者不可不審頃在四明同清涼範長老遊大梅或索和花光師墨梅十題題曰懸崖放下曰絶後再蘇曰平地春回曰淡中有味曰一枝橫出曰五葉聯芳曰高下隨宜曰正偏自在曰幻花滅盡曰實相常圓首尾託物顯理借位明功以形容禪家流工夫從入道應世至於得旨歸根邊事無準於實相常圓著語云黃底自黃青底青枝頭一一見天真如今酸澀都忘了核子如何説向人豫愧短乏哦咏非素習不得已亦勉強思量到思量不及處果幻花滅盡耶墨梅無下口處耶懡㦬中不覺失笑噫絶後再蘇耶平地回春耶於湊泊不及處湊泊成二百八十字字韻句意不揀重復但不失題意而已掉在無事甲中十見青黃一日與畏友艮岩火爐頭夜話之艮岩亦欣然成十章併録之放筆一笑是淘汰業識耶是錯礱言句耶必有為我剗去者題無染頌軸後純公座元號無染乃鍾山第一座崈公稱之復作序序之意以有無染淨是二邊語存一遣一共過患等雙遣雙存過患亦匪存匪遣茫茫莫究其辭宛轉其意深妙光明藏中快説禪病莫過于此也末後又云余著語是無染上一重染污今諸公從而頌之是一重更一重無染安在哉不向一重復一重處求之可乎石溪野人直言之曰要識吾無染純公座元是凹岩説採三字隱語作金仙子隱曰偉子蒙沂子良寂子照癸巳仲春月望會月子友於石溪之北日永風清漱石枕流相為賞樂適福都子隆子至奉細綰盈鋪之供子友緩帶摩腹指空作凹岩字遺曰貧無以贈一之三三名號洋洋乎言説不虗子隆子俯而思名號虗聲也言説亦無實義即虗聲而承言説可乎舍言説而求實義可乎復默而言虗聲即實義耶實義即言説耶久不自決三子隱知其心語乃伸右手各持一凹岩兀兀然巍巍然或嵌嵌確確空空洞洞或東西相向似有還虧頭角崢嶸若平而險白雲變態素月分輝流泉風松幽禽和唱各各岩前一一陳露子隆子不起于座如是而觀八十小劫心目不搖子友説偈寤之曰欲寫凹岩字未成雲開頭角見崢嶸中間一缺隱身地換盡面前人眼睛子隆子不覺唯唯點頭卷之而去自兀兀然至幽禽唱皆三子隱頌中之語太虗説竺乾古皇先生有句語如漫天網子相似非同太虗非異太虗而含裹太虗如是不離本處即一切處升法空座演此句義四十九年莫能究其萬分之一最後會百萬衆於一青蓮華上獨擎拳高士欣然微笑先生目之只得兩手分付綿綿至今無空缺處同流異學密證顯符莫知幾何有柱下隱君子之徒知清淨身如太虗之無邊故背之而坐鈎在不疑之地也悟平常心如太虗之豁然故從西過東無乃攙行奪市乎後五百載從寂寞沖虗中蹉腳南來失手摸著四面八方回避不及披襟當之號太虗者吾眉山揚若沖道士也歲莫抱焦桐訪城西蘭若須臾言辭故囑之曰異日平步家山遇賞音試彈此曲使大音希聲充乎太虗則不枉南來徒費草鞋錢也太虗太虗勉旃跋無傳頌鍾山正知客忽起故山之思往別北澗於常熟慧日澗喜其為正傳室中真子乃以無傳號之山中勝集皆有出山句橫推竪推無非以祖祖相傳傳而無傳不是無傳而曰無傳蓋無傳即正傳正傳即正無傳也噓無傳之旨果如是耶若言以心傳心却喚什麼作心即世諦則偽求之可乎離世諦則偽求之可乎或曰到處見成親受用不從蔥嶺帶將來皆非吾所能知也要識無傳之旨當從正無傳問之跋覺如居士手書心經覺如居士公務餘暇手書法華楞嚴圓覺金剛等經仍集古今諸家解説布於章句之下末後收功於心經其微意不言可知余展卷一觀見諸家所注一言是一言一句居士所書一畫是一畫一字是一字不免合掌贊嘆奇哉心經也若離此別求可乎淳祐己酉端午後五日靈隱住山某跋跋遊參政所書心經龜堂大資相公燕居霅上日書心經惠諸來學余遊太白方一聞之心已起敬及抵冷泉始獲一見奇哉第一希有之書也古今王公大人於此道或傾心贊之或肆口毀之雖贊毀不同同一心也楞嚴曰順逆皆方便矧龜堂所書二百七十六字既以心名孰不具有先覺後覺同入此門如是宣説如是書寫信解受持依如是住噫此時非菩薩行深般若波羅蜜多時耶具頂目者乃能默契添藏經施主水陸升座説偈大悲心上流出底呼為切腳若為評不知切腳什麼字寫不成兮呼不成依依俙俙如半月髣髣佛佛若三星分付老昭諸善士生生世世壽康寧容大師水陸升座説偈末山一境不露頂直下全超五障身佛國無邊皆自己臺山大會付何人苾芻草碧枝枝秀菡萏花紅葉葉新外祖深恩只者是一菴和氣暖於春如行新戒落髮升座患纍資生無有涯選官選佛學丹霞須知髮剗殿前草不礙萱開堂北花萬法從心心是正一心逐物物皆邪夜窗寂寂青松下究徹根源始到家勸請首座挂牌上堂三春去向那邊去九夏來從屋力來一喝兩頭俱坐斷人天眼目與誰開烏飛兔走地轉天回時有清風匝九垓寒山子滿頭灰引得豐干笑滿腮且道笑箇什麼問取首座上堂善惡不思名為頂句內外絶依名為得住時時寂寂惺惺時時退步薦取如是三十年覔之總無處覔無處贏得雙眉時陡聚上堂外息諸緣內心無喘心如牆壁可以入道此非少林初祖畫出底模子耶了了常知言不可及此非二祖從模子裡脫出底耶而今心憤憤口悱悱一箇半箇板齒為鐵橛將者模子一嚼百雜碎非知恩報恩者耶山僧斫額以待上堂舉馬大師因僧問如何是佛馬云即心是佛後南嶽讓和尚聞云馬子未在更五年馬云非心非佛讓云馬子未在更復五年馬云不是心不是佛讓云馬子徹也後有僧舉似大梅梅云者老漢教壞人家男女未有了日儞但非心非佛我只即心即佛師云馬大師非特教壞人家男女亦乃錯誤後代兒孫那裡是他錯誤處鯨吞海水盡露出瑚枝上堂舉臨濟無位真人話師云日永風清雷奔電卷無位真人略通一線急須著眼看仙人莫看仙人手中扇施主請水陸升座舉僧問福嚴某甲百年後以何為津梁嚴指心云以此為津梁僧亦指心云如何是此嚴云但行好事莫問前程師頌曰百年將底作津梁直指心田是道場八萬四千安樂法指胸云只於此處可承當舉臨濟半夏上黃蘗却回終夏古則師拈云黃蘗養子之緣臨濟事父之禮一時清規千載榜樣因甚到中途疑此事而回須信甜瓜徹蒂甜舉臨濟無位真人乾屎橛古則師頌曰沒便宜處討便宜無位真人小廝兒如是去來如是住無時不是在家時讚出山相棄却金輪尊貴人要來平地討艱辛如斯面目塵埃甚更説優曇別是春草衣文殊披草衣執具書面不洗頭不梳是文殊非文殊擬議臺山路轉迂馬郎婦願海散香風花披菡萏紅錦鱗方上釣金鎖已騰空自在觀音日高花影重風暖鳥聲碎在在圓通門門門觀自在寶陀峰頂較些些片月分輝照滄海泛蓮觀音一葉蓮舟泛渺瀰誦觀音也戴阿彌希奇妙相毫端上五濁衆生知未知藕絲觀音頂戴阿彌不假花冠之纍纍肩披藕絲不必瓔珞之垂垂孤然不倚儼然若思我於一十九類三十二應身中次第觀之而無如是抱膝安間大自在之風規布袋矬而肥肥而癡肩駝背負或徐或馳回頭處微笑時此意明明説向誰達磨祖師跨水行人語不符絶江足踏一莖蘆此時獨自棲棲去今日人將入畫圖小師正知畫師頂相請讚高厚同源萬殊一體卓爾何來湛然非止覽蜀天雲挹龍淵水際會如斯孰窮所以正知知之不出乎是師寄蔣山癡絶和尚並沂艮岩急水上旗翻五色飛流中毬輥百花相逢相笑勿相嘆無限行人未到家沒絃琴三弄五弄無孔笛一聲兩聲明月浮空天似水長安歸夢恰三更癡絶和尚和答沂首座盤陀石上無根樹畢竟空中有蒂花樹已成林花結果行人到此合忘家生鐵團上重重縫電光影裡撮雷聲果然點眼知人意便把三更作五更女子少年雙鬢雪婆婆八十滿頭花芝蘭庭畔相携手明月清風共一家芻狗吠成師子吼木雞啼作鳳凰聲貪觀秋水連天碧不覺桑田幾變更
